gui:
  craft-info:
    lore:
      command: ' &8➥ &e%s'
      header:
      - ''
      - '&a包含:'
      item: ' &8➥ &e%s&fx%d'
  edit:
    item:
      material:
        lore:
        - '&7点击 查看/编辑'
        - ''
        - '&7当前:'
        - '%s'
        too-much: '&e你放的材料太多了! 超出了界面能够显示的范围，玩家将无法从界面中看到完整材料列表。&b请调整材料列表，或调整界面配置。'
        name: '&a材料'
      multiple:
        lore:
        - '&7点击 编辑'
        - '&7格式 "5 10 20"'
        - '&7对应 小/中/大 失败/成功 的 涨幅/跌幅'
        - ''
        - '&7当前: &e%s'
        name: '&a倍数'
      cost:
        description:
        - '&7点击 查看/编辑'
        - '&7使用正整数'
        - ''
        - '&7当前: &e%money% %currency%'
        name: '&a价格'
      display:
        name: '&a显示物品'
        lore:
        - '&7点击 查看/编辑'
        - '&7对外显示的物品外貌'
        - ''
        - '&7当前: &e%s'
      combo:
        name: '&a连击次数'
        lore:
        - '&7左键点击 增加1'
        - '&7右键点击 减少1'
        - '&7Shift+左键点击 增加10'
        - '&7Shift+右键点击 减少10'
        - ''
        - '&7设置连击次数后，玩家在普通锻造中'
        - '&7可以鼠标右键进行锻造连击，即进行数次锻造判定，'
        - '&7当判定时因大失败导致材料不足，将终止连击，保留进度。'
        - ''
        - '&7单次连击次数: &e%s'
      successful-rate:
        lore:
        - '&7点击 编辑'
        - '&7使用正整数'
        - ''
        - '&7当前: &e%d'
        name: '&a成功率'
      cost-level:
        name: '&a花费经验等级'
        lore:
        - '&7点击 查看/编辑'
        - '&7使用正整数'
        - ''
        - '&7当前: &e%d'
      difficult:
        lore:
        - '&7左键点击 切换状态'
        - ''
        - '&7开启困难锻造之后，普通的敲打锻造将会'
        - '&7被替换为 CustomFishing 小游戏锻造。'
        - '&7小游戏失败则敲打失败，小游戏成功再按概率'
        - '&7计算是否成功。'
        - ''
        - '&7状态: %s'
        name: '&a困难锻造'
      time-count-limit:
        lore:
        - '&7左键点击 选择限制组 普通/困难锻造'
        - '&7右键点击 移除限制组 普通/困难锻造'
        - ''
        - '&7Shift+左键点击 选择限制组 时长锻造'
        - '&7Shift+右键点击 移除限制组 时长锻造'
        - ''
        - '&7设置锻造次数限制后，玩家被限制只能进行指定次数'
        - '&7的指定类型锻造，超过次数无法再进行该类型锻造。'
        - '&7限制组的详细设定详见配置文件 config.yml'
        - ''
        - '&7普通/困难锻造 限制组: &e%s'
        - '&7时长锻造 限制组: &e%s'
        name: '&a锻造次数限制'
      fail-times:
        name: '&a保底次数'
        lore:
        - '&7左键点击 增加1'
        - '&7右键点击 减少1'
        - '&7Shift+左键点击 增加10'
        - '&7Shift+右键点击 减少10'
        - ''
        - '&7设置保底次数后，当失败次数超过保底次数时，'
        - '&7所有类型的失败将变为小成功'
        - ''
        - '&7保底次数: &e%s'
      time:
        description:
        - '&7左键点击 增加1分钟'
        - '&7右键点击 减少1分钟'
        - '&7Shift+左键点击 增加10分钟'
        - '&7Shift+右键点击 减少10分钟'
        - '&7鼠标悬停按Q键 设置所需金币'
        - ''
        - '&7当时间大于0时，在锻造界面增加“时长锻造”选项'
        - '&7玩家可以选择进行“时长锻造”操作，花费一定金币'
        - '&7等待一段时间即可获得奖励，无需敲打锻造。'
        - ''
        - '&7当前时长: &f%time%'
        - '&7花费金钱: &f%money% %currency%'
        name: '&a锻造时长'
      item:
        name: '&a奖励物品'
        lore:
        - '&7点击 查看/编辑'
        - '&7锻造成功后给予的物品'
        - ''
        - '&7当前:'
        - '%s'
      command:
        name: '&a奖励命令'
        lore:
        - '&7点击 查看/编辑'
        - '&7格式 "say 这个插件太棒了||服务器说这个插件太棒了"'
        - '&7用 || 分割，左边是命令 右边是显示出来的介绍'
        - '&7此处支持 PAPI 变量'
        - '&7锻造成功后执行的命令'
        - ''
        - '&7当前:'
        - '%s'
    status:
      'on': '&a开启'
      'off': '&c关闭'
    currency:
      not-available: '&e货币类型 %currency% 不可用'
    unset: '&f未设置'
  edit-input-chance: '&a请输入概率 正整数'
  edit-item-title: 奖励物品
  edit-command-tips:
  - '&a请在聊天栏发送命令 &7(无需/)&a，支持PAPI变量'
  - '  &a格式: &e命令||显示内容'
  - '  &a示例: &esay 这个插件太棒了||服务器说这个插件太棒了'
  edit-input-multiple: '&a请按照格式填写倍率 "5 10 20" (小 中 大)'
  edit-time-limit-count-title-time: '&0选择 时长锻造限制组'
  edit-display-title: 将要展示的物品放在第一格
  category:
    not-found: '&c未找到 &e%s'
  edit-title: '&0编辑 %s'
  edit-command-title: 奖励命令 (点击空格子添加)
  edit-input-cost-level: '&a请输入经验等级 正整数'
  edit-time-cost-currency-sum:
    tips:
    - '&a按以下格式修改数值 正整数'
    - '&e  M+数值 &f修改时长锻造价格，如&e M100 &f消耗100金币'
    - '&e  M+数值+空格+货币 &f修改时长锻造价格，如&e M100 PlayerPoints &f消耗100点券'
    - '&f货币格式可使用&e 插件名:货币名 &f格式，例如&e CoinsEngine:Example'
    - '&e  L+数值 &f修改时长锻造消耗经验等级，如&e L3 &f消耗3级经验'
    wrong-type: '&e时长锻造消耗输入格式有误'
  edit-input-cost-currency:
  - '&a按以下格式修改锻造价格 正整数'
  - '&e  数值 &f修改锻造价格，如&e 100 &f消耗100金币'
  - '&e  数值+空格+货币 &f修改锻造价格，如&e 100 PlayerPoints &f消耗100点券'
  - '&f货币格式可使用&e 插件名:货币名 &f格式，例如&e CoinsEngine:Example'
  edit-command-lore:
  - ''
  - '&4点击删除'
  edit-display-not-found: '&c未找到第一格的物品'
  edit-time-limit-count-title-normal: '&0选择 普通/困难锻造限制组'
  edit-material-title: '&0材料'
