# Add the goto option to use the configuration file at the specified path as the database config
# After adding it, all other options below can be removed
# goto: 'path/to/database.yml'

# Database type, available options: yaml, sqlite, and mysql
type: yaml
# Table name prefix
table_prefix: 'craftitem_'
# JDBC parameters
query: 'useSSL=false&allowPublicKeyRetrieval=true&verifyServerCertificate=false&serverTimezone=UTC'
# Connection pool settings
hikari:
  max_lifetime: 120000
  idle_timeout: 10000
  connection_timeout: 5000
  minimum_idle: 8
  maximum_pool_size: 36
# MySQL settings
mysql:
  version: 8
  host: localhost
  port: 3306
  user: 'root'
  pass: 'root'
  database: minecraft
# SQLite settings
sqlite:
  file: 'database.db'
