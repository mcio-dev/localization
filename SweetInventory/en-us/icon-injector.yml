# Redirect this file to the specified path. After setting this value,
# all configurations below will be ignored.
#goto: 'path/to/icon-injector.yml'

# When the configuration contains require-keys, merge the merge configuration into the icon
icon-injectors:
  - require-keys:
      - 'left-click-money'
    merge:
      left-click:
        requirements:
          money-requirement:
            type: eval
            expression: '%vault_eco_balance% >= ${this.left-click-money}'
            deny-commands:
              - '[message]&eYou do not have enough money to perform this action &7(Requires ${this.left-click-money} coins)'
        commands-pre:
          - '[console]money take %player% ${this.left-click-money}'
  - require-keys:
      - 'right-click-money'
    merge:
      right-click:
        requirements:
          money-requirement:
