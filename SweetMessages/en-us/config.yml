# Default title time
title-default:
  fade-in: 10
  stay: 40
  fade-out: 10
# Preset title times, use --time=name or -t=name before title to use
title-times:
  # Example: /smsgs title -t=example test\nPreset time
  example:
    fade-in: 0
    stay: 60
    fade-out: 0

# Message broadcast settings
broadcast:
  # Broadcast method
  # BUNGEE_CORD -- Broadcast through BungeeCord messages, requires at least one player online on the server
  # DATABASE -- Broadcast through MySQL database polling messages, does not require players online on the server, delay about 1 second
  method: BUNGEE_CORD
  # Broadcast message group name, only sub-servers in the same group can receive messages normally
  group: global
